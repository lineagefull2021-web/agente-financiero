<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💰 Agente Financiero</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: linear-gradient(145deg, #0b1a33 0%, #1a3a5c 100%);
            background-attachment: fixed;
            position: relative;
            overflow: hidden;
        }
        .wave {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.10;
        }
        .wave svg {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 120%;
            animation: waveMove 12s ease-in-out infinite alternate;
        }
        .wave svg:nth-child(2) { animation-delay: -4s; opacity: 0.5; }
        .wave svg:nth-child(3) { animation-delay: -8s; opacity: 0.3; }
        @keyframes waveMove {
            0% { transform: translateX(0) scaleY(1); }
            33% { transform: translateX(-5%) scaleY(0.8); }
            66% { transform: translateX(5%) scaleY(1.2); }
            100% { transform: translateX(0) scaleY(1); }
        }
        .container {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            max-width: 480px;
            width: 100%;
            padding: 28px 24px;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.15);
            text-align: center;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 4px;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            color: #0b2a4a;
        }
        .badge {
            background: linear-gradient(145deg, #1a73e8, #0d47a1);
            color: white;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 14px;
            border-radius: 30px;
            box-shadow: 0 2px 8px rgba(26, 115, 232, 0.3);
        }
        .subtitle {
            color: #4a6a8a;
            font-size: 14px;
            margin-bottom: 20px;
            border-left: 3px solid #1a73e8;
            padding-left: 12px;
            text-align: left;
        }
        .form-wrapper {
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        }
        .form-wrapper iframe {
            width: 100%;
            height: 580px;
            border: none;
            border-radius: 16px;
        }
        .footer {
            margin-top: 16px;
            font-size: 13px;
            color: #64748b;
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .footer a {
            color: #1a73e8;
            text-decoration: none;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 30px;
            background: #eef2ff;
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
        }
        .footer a:hover {
            background: #1a73e8;
            color: white;
        }
        @media (max-width: 480px) {
            .container { padding: 18px 14px; }
            h1 { font-size: 20px; }
            .form-wrapper iframe { height: 520px; }
        }
    </style>
</head>
<body>
    <div class="wave">
        <svg viewBox="0 0 1200 200" preserveAspectRatio="none">
            <path d="M0,100 C300,0 600,200 900,50 C1000,20 1100,80 1200,100 L1200,200 L0,200 Z" fill="#1a73e8"/>
        </svg>
        <svg viewBox="0 0 1200 200" preserveAspectRatio="none">
            <path d="M0,100 C200,150 500,20 800,120 C950,170 1050,100 1200,120 L1200,200 L0,200 Z" fill="#0d47a1"/>
        </svg>
        <svg viewBox="0 0 1200 200" preserveAspectRatio="none">
            <path d="M0,80 C400,160 700,20 1000,100 C1100,130 1150,90 1200,90 L1200,200 L0,200 Z" fill="#1a3a5c"/>
        </svg>
    </div>

    <div class="container">
        <div class="header">
            <h1>💰 Agente <span class="badge">v2.0</span></h1>
        </div>
        <p class="subtitle">📋 Registra tus ingresos y gastos</p>

        <div class="form-wrapper">
            <iframe src="https://docs.google.com/forms/d/e/1FAIpQLScfbvZweVr6PZMAHFE8i8W0Fz9xM3tDdq05EEglruwMA-0qdg/viewform?embedded=true"></iframe>
        </div>

        <div class="footer">
            <a href="#" id="btnDescargar">📥 Descargar Excel</a>
        </div>
    </div>

    <script>
        const ID_PLANILLA = "1z3iv1BUcrKKCsoE8eo2iF5zz3KZkkuXvQXHNlWg2cSA";

        document.getElementById('btnDescargar').addEventListener('click', function(e) {
            e.preventDefault();
            window.open('https://docs.google.com/spreadsheets/d/' + ID_PLANILLA + '/edit', '_blank');
        });
    </script>
</body>
</html>
